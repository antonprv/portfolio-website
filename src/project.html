<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Проект</title>

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/project-page.css" />
</head>
<body class="page-project">

  <!-- Custom scrollbar (left side, same as projects section) -->
  <div class="custom-scrollbar" id="custom-scrollbar">
    <div class="custom-scrollbar__thumb" id="scrollbar-thumb"></div>
  </div>
  <button class="theme-switcher" id="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">
    <svg class="theme-icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-icon moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <div class="lang-switcher">
    <button class="lang-btn active" id="btn-ru" onclick="setLang('ru')">RU</button>
    <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
  </div>

  <!-- Content injected by project-page.js -->
  <main id="project-root"></main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <!-- Page-transition overlay -->
  <div class="page-transition" id="page-transition"></div>

  <script src="js/theme.js"></script>
  <script src="js/project-page.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/lang.js"></script>
</body>
</html>
